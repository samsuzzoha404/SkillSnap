kind = "mobile"
previewPath = "/"
title = "SkillSnap"
version = "1.0.0"
id = "artifacts/skillsnap"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22172

[services.development]
run = "pnpm --filter @workspace/skillsnap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillsnap", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/skillsnap", "run", "serve" ]

[services.env]
PORT = "22172"
BASE_PATH = "/"
